name: Continuous Integration

on:
  push:
    branches:
      - main
      - dev
  pull_request:
    branches:
      - main
      - dev

jobs:
  validate:
    name: Build & Test Validation
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # 获取完整提交历史以便 Turborepo 能够进行增量检测

      - name: Install pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9 # 自动识别或匹配 pnpm@9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "pnpm" # 自动开启 pnpm 全局缓存

      - name: Install Dependencies
        run: pnpm install --frozen-lockfile

      - name: Cache Turborepo Local Cache
        id: turbo-cache
        uses: actions/cache@v4
        with:
          path: .turbo
          key: ${{ runner.os }}-turbo-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-turbo-

      - name: Run Quality Verification (Lint)
        run: pnpm lint

      - name: Run Build Verification
        run: pnpm build

      - name: Run Unit Tests
        run: pnpm test
