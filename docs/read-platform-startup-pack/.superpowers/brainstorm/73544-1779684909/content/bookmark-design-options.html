<h2>书签功能设计</h2>
<p class="subtitle">选择书签按钮的放置位置和展示方式</p>

<div class="section">
  <h3>1. 添加书签按钮位置</h3>
  <div class="options">
    <div class="option" data-choice="top-bar" onclick="toggleSelect(this)">
      <div class="letter">A</div>
      <div class="content">
        <h3>顶部工具栏</h3>
        <p>在顶部导航栏右侧添加书签图标。方便随时点击。</p>
      </div>
    </div>
    <div class="option" data-choice="bottom-bar" onclick="toggleSelect(this)">
      <div class="letter">B</div>
      <div class="content">
        <h3>底部工具栏</h3>
        <p>在底部工具栏添加“书签”按钮，点击后弹出确认或直接保存。</p>
      </div>
    </div>
    <div class="option" data-choice="floating" onclick="toggleSelect(this)">
      <div class="letter">C</div>
      <div class="content">
        <h3>侧边悬浮按钮</h3>
        <p>在屏幕右侧悬浮一个半透明书签图标。最直接但可能遮挡内容。</p>
      </div>
    </div>
  </div>
</div>

<div class="section">
  <h3>2. 书签列表展示方式</h3>
  <div class="options">
    <div class="option" data-choice="toc-tabs" onclick="toggleSelect(this)">
      <div class="letter">D</div>
      <div class="content">
        <h3>目录抽屉分页</h3>
        <p>在现有的目录抽屉顶部增加“目录”和“书签”两个标签页切换。</p>
      </div>
    </div>
    <div class="option" data-choice="separate-drawer" onclick="toggleSelect(this)">
      <div class="letter">E</div>
      <div class="content">
        <h3>独立书签抽屉</h3>
        <p>从右侧弹出独立的书签管理抽屉。逻辑更清晰。</p>
      </div>
    </div>
  </div>
</div>
